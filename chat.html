<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yunus — Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
        height: 100%;
        font-family: 'Geist', sans-serif;
        background: #f8fafc;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }

    #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-width: 480px;
        margin: 0 auto;
        background: #f8fafc;
    }

    #appHeader {
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        padding: 14px 20px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    #appHeader span {
        font-size: 15px;
        font-weight: 500;
        color: #0f172a;
        letter-spacing: -0.01em;
    }

    #btnCerrarSesion {
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        color: #64748b;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
    }

    #loginBox {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow-y: auto;
    }

    #loginBox .inner {
        width: 100%;
        max-width: 320px;
    }

    #loginBox h2 {
        font-size: 20px;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 6px;
    }

    #loginBox p {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 24px;
    }

    .input-row {
        display: flex;
        gap: 8px;
    }

    .prefix {
        padding: 12px;
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 16px;
        color: #64748b;
        flex-shrink: 0;
    }

    #celularInput {
        flex: 1;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 16px;
        outline: none;
        font-family: inherit;
        background: #fff;
        -webkit-appearance: none;
        transition: border-color 0.2s;
    }

    #celularInput:focus { border-color: #0f172a; }

    #btnEntrar {
        width: 100%;
        margin-top: 14px;
        background: #0f172a;
        color: #fff;
        padding: 14px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 500;
        border: none;
        cursor: pointer;
        font-family: inherit;
        -webkit-appearance: none;
    }

    #chatBox {
        display: none;
        flex-direction: column;
        flex: 1;
        min-height: 0;
    }

    #mensajes {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        -webkit-overflow-scrolling: touch;
    }

    #mensajes::-webkit-scrollbar { display: none; }

    #inputBar {
        background: #fff;
        border-top: 1px solid #e2e8f0;
        padding: 10px 14px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
    }

    #cameraBtn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        border: none;
    }

    #inputMsg {
        flex: 1;
        background: #f1f5f9;
        border: none;
        border-radius: 999px;
        padding: 11px 16px;
        font-size: 16px;
        outline: none;
        font-family: inherit;
        -webkit-appearance: none;
        color: #0f172a;
    }

    #sendBtn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #0f172a;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
</style>

</head>
<body>

<div id="app">

<div id="appHeader">
    <span>Yunus 1.0 BETA</span>
    <button type="button" id="btnCerrarSesion" data-action="salir" style="display:none;">Salir</button>
</div>

<!-- LOGIN -->
<div id="loginBox">
    <div class="inner">
        <h2>Ingresa tu número</h2>
        <p>El mismo con el que te registraste.</p>
        <div class="input-row">
            <span class="prefix">+52</span>
            <input id="celularInput" type="tel" placeholder="10 dígitos" maxlength="10"
                inputmode="numeric" pattern="[0-9]*">
        </div>
        <button id="btnEntrar" onclick="iniciarChat()">Entrar →</button>
        <div id="loginError" style="display:none; margin-top:12px; padding:10px 14px; background:#fef2f2; border:1px solid #fecaca; border-radius:10px; font-size:13px; color:#dc2626; text-align:center;"></div>
    </div>
</div>

<!-- CHAT -->
<div id="chatBox">
    <div id="mensajes"></div>
    <div id="inputBar">
        <label for="inputFoto" id="cameraBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        </label>
        <input id="inputFoto" type="file" accept="image/*" style="display:none;" onchange="enviarFoto(this)">
        <input id="inputMsg" type="text" placeholder="Escribe un mensaje..."
            onkeydown="if(event.key==='Enter') enviar()">
        <button id="sendBtn" onclick="enviar()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>
</div>

</div>

<script>
let celular = '';
let primerMensajeYunus = true;

async function mostrarChat() {
    document.getElementById('loginBox').style.display = 'none';
    const chatBox = document.getElementById('chatBox');
    chatBox.style.display = 'flex';
    document.getElementById('btnCerrarSesion').style.display = 'inline-block';
    primerMensajeYunus = true;

    // Try to load historial from server (cross-device)
    try {
        const res = await fetch(`/api/historial?celular=${encodeURIComponent(celular)}`);
        if (res.ok) {
            const data = await res.json();
            if (data.historial && data.historial.length > 0) {
                localStorage.setItem('yunus_historial', JSON.stringify(data.historial));
            }
        }
    } catch {
        // Server unavailable, fall through to localStorage
    }

    const historial = JSON.parse(localStorage.getItem('yunus_historial') || '[]');
    if (historial.length === 0) {
        agregarMensaje('Hola, escríbeme para comenzar 👋', 'yunus');
    } else {
        historial.forEach(m => renderMensaje(m.texto, m.tipo, m.esImagen));
    }
}

async function iniciarChat() {
    const input = document.getElementById('celularInput').value.trim();
    if (input.length !== 10) { mostrarError('Ingresa 10 dígitos válidos.'); return; }

    ocultarError();
    const btn = document.getElementById('btnEntrar');
    btn.disabled = true;
    btn.textContent = 'Verificando...';

    const numeroCelular = '+52' + input;

    try {
        const res = await fetch('/api/historial?celular=' + encodeURIComponent(numeroCelular));

        if (res.status === 404) {
            mostrarError('Este número no está registrado. Regístrate primero en yunusia.com');
            btn.disabled = false;
            btn.textContent = 'Entrar →';
            return;
        }

        celular = numeroCelular;
        localStorage.setItem('yunus_celular', celular);

        if (res.ok) {
            const data = await res.json();
            if (data.historial && data.historial.length > 0) {
                localStorage.setItem('yunus_historial', JSON.stringify(data.historial));
            }
        }

        btn.disabled = false;
        btn.textContent = 'Entrar →';
        mostrarChatDirecto();

    } catch {
        celular = numeroCelular;
        localStorage.setItem('yunus_celular', celular);
        btn.disabled = false;
        btn.textContent = 'Entrar →';
        mostrarChatDirecto();
    }
}

function mostrarError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
}

function ocultarError() {
    document.getElementById('loginError').style.display = 'none';
}

function cerrarSesion() {
    try {
        localStorage.removeItem('yunus_celular');
        localStorage.removeItem('yunus_historial');
    } catch (e) {
        console.warn('No se pudo limpiar localStorage:', e);
    }
    celular = '';
    document.getElementById('chatBox').style.display = 'none';
    document.getElementById('loginBox').style.display = 'flex';
    document.getElementById('btnCerrarSesion').style.display = 'none';
    document.getElementById('mensajes').innerHTML = '';
    document.getElementById('celularInput').value = '';
    primerMensajeYunus = true;
}

function renderMensaje(texto, tipo, esImagen = false) {
    const contenedor = document.getElementById('mensajes');
    const esYunus = tipo === 'yunus';

    const wrapper = document.createElement('div');
    wrapper.style.cssText = `display: flex; align-items: flex-end; gap: 8px; justify-content: ${esYunus ? 'flex-start' : 'flex-end'};`;

    if (esYunus && primerMensajeYunus) {
        const avatar = document.createElement('img');
        avatar.src = 'Vector.png';
        avatar.style.cssText = 'width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid #e2e8f0;';
        avatar.onerror = function() { this.style.display = 'none'; };
        wrapper.appendChild(avatar);
        primerMensajeYunus = false;
    } else if (esYunus) {
        const spacer = document.createElement('div');
        spacer.style.cssText = 'width: 28px; flex-shrink: 0;';
        wrapper.appendChild(spacer);
    }

    const burbuja = document.createElement('div');
    if (esYunus) {
        burbuja.style.cssText = 'max-width: 78%; background: #fff; border: 1px solid #e2e8f0; border-radius: 18px; border-bottom-left-radius: 4px; padding: 10px 14px; font-size: 14px; color: #1e293b; line-height: 1.5;';
    } else {
        burbuja.style.cssText = 'max-width: 78%; background: #0f172a; border-radius: 18px; border-bottom-right-radius: 4px; padding: 10px 14px; font-size: 14px; color: #fff; line-height: 1.5;';
    }

    if (esImagen) {
        const img = document.createElement('img');
        img.src = texto;
        img.style.cssText = 'border-radius: 10px; max-width: 100%; max-height: 180px; object-fit: cover; display: block;';
        burbuja.appendChild(img);
    } else {
        burbuja.textContent = texto;
    }

    wrapper.appendChild(burbuja);
    contenedor.appendChild(wrapper);
    contenedor.scrollTop = contenedor.scrollHeight;
}

function agregarMensaje(texto, tipo, esImagen = false) {
    const historial = JSON.parse(localStorage.getItem('yunus_historial') || '[]');
    historial.push({ texto, tipo, esImagen });
    localStorage.setItem('yunus_historial', JSON.stringify(historial));
    renderMensaje(texto, tipo, esImagen);
}

function comprimirImagen(file, maxWidth = 1000, calidad = 0.7) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = Math.min(1, maxWidth / img.width);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', calidad));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function enviarFoto(input) {
    const file = input.files[0];
    if (!file) return;
    const base64 = await comprimirImagen(file);
    agregarMensaje(base64, 'usuario', true);
    input.value = '';
    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensaje: '', celular, imagen: base64 })
        });
        const data = await res.json();
        // Replace base64 in localStorage with Cloudinary URL for cross-device compatibility
        if (data.imagenUrl) {
            const historial = JSON.parse(localStorage.getItem('yunus_historial') || '[]');
            for (let i = historial.length - 1; i >= 0; i--) {
                if (historial[i].tipo === 'usuario' && historial[i].esImagen) {
                    historial[i].texto = data.imagenUrl;
                    break;
                }
            }
            localStorage.setItem('yunus_historial', JSON.stringify(historial));
        }
        agregarMensaje(data.respuesta || 'Error al procesar tu imagen.', 'yunus');
    } catch {
        agregarMensaje('Error de conexión.', 'yunus');
    }
}

async function enviar() {
    const input = document.getElementById('inputMsg');
    const mensaje = input.value.trim();
    if (!mensaje) return;
    input.value = '';
    agregarMensaje(mensaje, 'usuario');
    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensaje, celular })
        });
        const data = await res.json();
        agregarMensaje(data.respuesta || 'Error al procesar tu mensaje.', 'yunus');
    } catch {
        agregarMensaje('Error de conexión.', 'yunus');
    }
}

document.addEventListener('click', function(e) {
    const btn = e.target.closest('#btnCerrarSesion');
    if (btn) {
        e.preventDefault();
        e.stopPropagation();
        cerrarSesion();
    }
});

window.addEventListener('DOMContentLoaded', () => {
    const celularGuardado = localStorage.getItem('yunus_celular');
    if (celularGuardado) {
        celular = celularGuardado;
        mostrarChat();
    }
});
</script>

</body>
</html>
