<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yunus — A Foro Lleno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0a0a;
            --paper: #F2EFE8;
            --volt: #D4F53C;
            --muted: #5C5C5C;
            --border: rgba(242,239,232,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: var(--volt); color: var(--ink); }

        html, body {
            height: 100%;
            background: var(--ink);
            color: var(--paper);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* GRAIN OVERLAY */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 128px;
        }

        /* HEADER FIJO CON LOGO DESBORDADO */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px; /* Header delgado */
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo {
            width: 260px; /* Tamaño grande para compensar el padding transparente */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .logo-fallback {
            display: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--paper);
            letter-spacing: 0.04em;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            position: relative;
            z-index: 1;
            margin-top: 72px; /* Compensa el header */
        }

        /* ESTILO TERMINAL / CONSOLA (Reemplazo del badge genérico) */
        .terminal-status {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .terminal-status span {
            color: var(--volt);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background-color: var(--volt);
            animation: blink 1s step-end infinite;
            margin-bottom: -2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(72px, 14vw, 140px);
            line-height: 0.9;
            letter-spacing: 0.02em;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        h1 em {
            color: transparent;
            -webkit-text-stroke: 1.5px var(--muted);
            font-style: normal;
        }

        p {
            font-size: 16px;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 48px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-refresh {
            background: transparent;
            color: var(--paper);
            border: 1px solid var(--border);
            padding: 14px 32px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px;
        }

        .btn-refresh:hover {
            border-color: var(--paper);
            background: rgba(255, 255, 255, 0.03);
        }

        .footer-note {
            position: absolute;
            bottom: 32px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <img src="darklogo.png" alt="Yunus" class="header-logo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
        <div id="logoFallback" class="logo-fallback">YUNUS</div>
    </header>

    <div class="main-content">
        
        <div class="terminal-status">
            > SYS_OVERLOAD: <span>AMPLIANDO_AFORO</span><div class="cursor"></div>
        </div>

        <h1>A foro<br><em>lleno.</em></h1>

        <p>
            Rompieron la taquilla. El volumen de solicitudes en nuestro lanzamiento ha superado todas las proyecciones. Estamos inyectando más capacidad a nuestros servidores para procesar tu solicitud.
        </p>

        <button class="btn-refresh" onclick="window.location.reload()">
            Reintentar conexión ↻
        </button>
    </div>

    <div class="footer-note">
        Esta página se actualizará automáticamente en <span id="countdown">60</span>s
    </div>

    <script>
        let timeLeft = 60;
        const countdownEl = document.getElementById('countdown');
        
        setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                window.location.reload();
            }
        }, 1000);
    </script>
</body>
</html>
