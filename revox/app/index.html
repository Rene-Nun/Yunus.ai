<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Revox — Inversión</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0a0a;
  --paper: #ffffff;
  --volt: #D4F53C;
  --muted: #6b7280;
  --border: rgba(0,0,0,0.08);
  --card-bg: #ffffff;
  --success: #10b981;
  --warning: #f59e0b;
  --revox-blue: #101CBD;
  --revox-cyan: #48A8E0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: var(--volt); color: var(--ink); }

html, body {
  min-height: 100dvh;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* LOGIN SCREEN */
#loginBox {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--paper);
}

#loginBox .inner {
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.login-logo {
  width: 200px;
  height: auto;
  object-fit: contain;
  margin-top: -30px;
  margin-bottom: -10px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.1s both;
}

.login-h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px;
  line-height: 0.95;
  letter-spacing: 0.02em;
  color: var(--ink);
  text-align: center;
  margin-bottom: 12px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.2s both;
}

.login-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  text-align: center;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.3s both;
}

.btn-registro {
  width: 100%;
  padding: 14px;
  background: linear-gradient(90deg, var(--revox-blue) 0%, var(--revox-cyan) 100%);
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.2s;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.4s both;
}
.btn-registro:hover { opacity: 0.9; }

.divider-wrap {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.45s both;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider-text {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 8px;
  width: 100%;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.5s both;
}

.prefix {
  padding: 12px;
  background: #f3f4f6;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--muted);
  flex-shrink: 0;
}

#celularInput {
  flex: 1;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  outline: none;
  font-family: inherit;
  background: #f3f4f6;
  -webkit-appearance: none;
  transition: border-color 0.2s;
  color: var(--ink);
}
#celularInput::placeholder { color: #9ca3af; }
#celularInput:focus { border-color: var(--revox-cyan); }

#btnEntrar {
  width: 100%;
  margin-top: 12px;
  background: var(--ink);
  color: var(--paper);
  padding: 14px;
  border-radius: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.2s;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.55s both;
}
#btnEntrar:hover { opacity: 0.85; }

#loginError {
  display: none;
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 10px;
  font-size: 13px;
  color: #ef4444;
  text-align: center;
  width: 100%;
}

.login-footer {
  margin-top: auto;
  padding-top: 32px;
  text-align: center;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.6s both;
}
.login-footer span {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}

/* DASHBOARD */
#dashboardBox {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  background: #f8f9fa;
}

/* HEADER DASHBOARD */
.dash-header {
  background: var(--paper);
  padding: 20px;
  border-bottom: 1px solid var(--border);
}
.dash-header-top {
  display: flex;
  align-items: center;
  justify-content: flex-end; 
  margin-bottom: 16px;
  position: relative;
  min-height: 24px;
}
.dash-logo {
  width: 150px;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%); 
}
.dash-version {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.dash-welcome {
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  color: var(--muted);
}
.dash-welcome strong {
  color: var(--ink);
  font-weight: 600;
}

/* CARDS */
.dash-content {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
  flex: 1;
}

.card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 24px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.card-main {
  background: linear-gradient(135deg, var(--revox-blue) 0%, var(--revox-cyan) 100%);
  color: #fff;
}
.card-main::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
}

.card-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.8;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.card-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 0.02em;
  line-height: 1;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}

.card-sub {
  font-size: 13px;
  opacity: 0.7;
  position: relative;
  z-index: 1;
}

/* GRID CARDS */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card-small {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
}

.card-small .card-label {
  color: var(--muted);
  opacity: 1;
  margin-bottom: 6px;
}

.card-small .card-amount {
  font-size: 24px;
  color: var(--ink);
}

.card-small .card-amount.volt {
  color: var(--success);
}

.card-small .card-amount.warning {
  color: var(--warning);
}

/* BOTON RETIRAR */
.btn-retirar {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 10px;
  padding: 6px 12px;
  background: rgba(16, 28, 189, 0.06);
  color: var(--revox-blue);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 500;
  transition: background 0.2s;
}
.btn-retirar:hover {
  background: rgba(16, 28, 189, 0.12);
}

/* ONBOARDING CARD */
.card-onboarding {
  background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
  border: 1px solid #bbf7d0;
  border-radius: 16px;
  padding: 24px;
  text-align: center;
}

.card-onboarding-icon {
  font-size: 40px;
  margin-bottom: 12px;
}

.card-onboarding h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 0.04em;
  color: var(--ink);
  margin-bottom: 8px;
}

.card-onboarding p {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 20px;
}

.btn-whatsapp {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  background: #25d366;
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 500;
  text-decoration: none;
  transition: opacity 0.2s;
}
.btn-whatsapp:hover { opacity: 0.9; }

/* INVERSIONES ACTIVAS */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.section-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.inversion-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 12px;
}

.inversion-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.inversion-title {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 15px;
  color: var(--ink);
}

.inversion-badge {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  background: rgba(16,28,189,0.08);
  color: var(--revox-blue);
  border-radius: 999px;
  font-weight: 500;
}

.inversion-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.inversion-detail {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.inversion-detail-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.inversion-detail-value {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
}

/* BOTÓN SALIR */
.btn-salir {
  width: 100%;
  padding: 14px;
  background: transparent;
  color: #ef4444;
  border: 1px solid rgba(239,68,68,0.2);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
  border-radius: 12px;
  margin-top: 8px;
}
.btn-salir:hover {
  background: rgba(239,68,68,0.05);
  border-color: #ef4444;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="app">

  <div id="loginBox">
    <div class="inner">
      <img src="/darkrevoxlogo.png" alt="Revox" class="login-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
      <div style="display:none; font-family:'Bebas Neue',sans-serif; font-size:48px; letter-spacing:0.04em; background:linear-gradient(90deg,#101CBD,#48A8E0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:32px;">REVOX</div>
      
      <h1 class="login-h1">Conoce las<br>inversiones revolventes.</h1>
      
      <p class="login-sub">Revox invierte en créditos con colateral real. Crea une cuenta y genera rendimientos de 18% anual sobre capital desplegado.</p>
      
      <a href="/revox/app" class="btn-registro">
        Registrarme en Yunus
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
      
      <div class="divider-wrap">
        <div class="divider-line"></div>
        <span class="divider-text">¿Ya tienes cuenta?</span>
        <div class="divider-line"></div>
      </div>
      
      <div class="input-row">
        <span class="prefix">+52</span>
        <input id="celularInput" type="tel" placeholder="10 dígitos" maxlength="10"
          inputmode="numeric" pattern="[0-9]*">
      </div>
      
      <button id="btnEntrar" onclick="iniciarRevox()">Entrar →</button>
      
      <div id="loginError"></div>
      
      <div class="login-footer">
        <span>REVOX 1.0.0 BETA</span>
      </div>
    </div>
  </div>

  <div id="dashboardBox">
    
    <div class="dash-header">
      <div class="dash-header-top">
        <img src="/darkrevoxlogo.png" alt="Revox" class="dash-logo">
        <span class="dash-version">1.0.0</span>
      </div>
      <div class="dash-welcome">
        Hola, <strong id="dashNombre">Inversor</strong>
      </div>
    </div>

    <div class="dash-content" id="dashContent">
      </div>

  </div>

</div>

<script>
let celular = '';

async function iniciarRevox() {
  const input = document.getElementById('celularInput').value.trim();
  if (input.length !== 10) { mostrarError('Ingresa 10 dígitos válidos.'); return; }

  ocultarError();
  const btn = document.getElementById('btnEntrar');
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  const numeroCelular = '+52' + input;

  try {
    const res = await fetch('/api/revox?celular=' + encodeURIComponent(numeroCelular));

    if (res.status === 404) {
      mostrarError('Este número no está registrado. Regístrate primero en Yunus.');
      btn.disabled = false;
      btn.textContent = 'Entrar →';
      return;
    }

    celular = numeroCelular;
    localStorage.setItem('revox_celular', celular);

    const data = await res.json();
    
    btn.disabled = false;
    btn.textContent = 'Entrar →';
    
    mostrarDashboard(data);

  } catch {
    mostrarError('Error de conexión. Intenta de nuevo.');
    btn.disabled = false;
    btn.textContent = 'Entrar →';
  }
}

function mostrarDashboard(data) {
  document.getElementById('loginBox').style.display = 'none';
  const dash = document.getElementById('dashboardBox');
  dash.style.display = 'flex';

  const nombre = data.nombre || 'Inversor';
  document.getElementById('dashNombre').textContent = nombre.split(' ')[0];

  const content = document.getElementById('dashContent');

  if (!data.esInversor) {
    content.innerHTML = `
      <div class="card-onboarding fade-up">
        <div class="card-onboarding-icon">💼</div>
        <h3>Bienvenido a Revox</h3>
        <p>Ya eres parte de Yunus. Para comenzar a invertir, deposita tu primera disposición de capital. Te asignaremos una tasa del 18% anual sobre lo desplegado.</p>
        <a href="https://wa.me/526563161314?text=${encodeURIComponent('Hola, me registré con Yunus y me interesa invertir en Revox. ¿Cómo deposito mi primera disposición?')}" 
           class="btn-whatsapp" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Depositar mi primera disposición
        </a>
      </div>
      <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
    `;
    return;
  }

  const inv = data.inversor;
  const disponible = inv.capitalDisponible || 0;
  const enUso = inv.capitalEnUso || 0;
  const rendimientos = inv.rendimientos || 0;
  const total = inv.capitalTotal || 0;

  // Lógica dinámica para imprimir múltiples créditos
  let htmlCreditos = '';
  if (inv.inversionesActivas && inv.inversionesActivas.length > 0) {
    let listaTarjetas = inv.inversionesActivas.map(credito => {
      // Formateo de fecha de disponibilidad (Si existe en Notion)
      let fechaTexto = 'Pendiente';
      if (credito.disponibleEn) {
        const [yyyy, mm, dd] = credito.disponibleEn.split('-');
        fechaTexto = `${dd}/${mm}/${yyyy}`;
      }

      return `
        <div class="inversion-card">
          <div class="inversion-header">
            <span class="inversion-title">${credito.evento} • ${credito.id}</span>
            <span class="inversion-badge">Activo</span>
          </div>
          <div class="inversion-details">
            <div class="inversion-detail">
              <span class="inversion-detail-label">Desplegado</span>
              <span class="inversion-detail-value">${fmtMXN(credito.monto)}</span>
            </div>
            <div class="inversion-detail">
              <span class="inversion-detail-label">Rend. Esperado</span>
              <span class="inversion-detail-value" style="color:var(--success);">+${fmtMXN(credito.rendimiento)}</span>
            </div>
            <div class="inversion-detail" style="margin-top: 8px;">
              <span class="inversion-detail-label">Plazo</span>
              <span class="inversion-detail-value">${credito.plazo} meses</span>
            </div>
            <div class="inversion-detail" style="margin-top: 8px;">
              <span class="inversion-detail-label">Disponible en</span>
              <span class="inversion-detail-value">${fechaTexto}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');

    htmlCreditos = `
      <div class="fade-up d3">
        <div class="section-header">
          <span class="section-title">Inversiones activas</span>
        </div>
        ${listaTarjetas}
      </div>
    `;
  }

  content.innerHTML = `
    <div class="card card-main fade-up">
      <div class="card-label">Capital total a tu nombre</div>
      <div class="card-amount">${fmtMXN(total)}</div>
      <div class="card-sub">Tasa activa: ${inv.tasa || 18}% anual</div>
    </div>

    <div class="cards-grid fade-up d1">
      <div class="card-small">
        <div class="card-label">Disponible</div>
        <div class="card-amount">${fmtMXN(disponible)}</div>
        <a href="https://wa.me/526563161314?text=${encodeURIComponent('Hola, quiero retirar mis fondos disponibles de Revox.')}" class="btn-retirar" target="_blank" rel="noopener">Retirar ↗</a>
      </div>
      <div class="card-small">
        <div class="card-label">En uso</div>
        <div class="card-amount warning">${fmtMXN(enUso)}</div>
      </div>
    </div>

    <div class="card-small fade-up d2" style="display:flex; align-items:center; justify-content:space-between;">
      <div>
        <div class="card-label">Rendimientos acumulados</div>
        <div class="card-amount volt">${fmtMXN(rendimientos)}</div>
      </div>
      <div style="font-size:24px;">📈</div>
    </div>

    ${htmlCreditos}

    <button class="btn-salir fade-up" onclick="cerrarSesion()">Cerrar sesión</button>
  `;
}

function fmtMXN(n) {
  if (!n && n !== 0) return '$0';
  return '$' + n.toLocaleString('es-MX', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' <span style="font-size:0.6em; opacity:0.6;">MXN</span>';
}

function mostrarError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

function ocultarError() {
  document.getElementById('loginError').style.display = 'none';
}

function cerrarSesion() {
  localStorage.removeItem('revox_celular');
  celular = '';
  document.getElementById('dashboardBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('celularInput').value = '';
}

window.addEventListener('DOMContentLoaded', () => {
  const guardado = localStorage.getItem('revox_celular');
  if (guardado) {
    celular = guardado;
    // Revalidar sesión
    fetch('/api/revox?celular=' + encodeURIComponent(celular))
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => mostrarDashboard(data))
      .catch(() => {
        localStorage.removeItem('revox_celular');
        // Queda en login
      });
  }
});
</script>
